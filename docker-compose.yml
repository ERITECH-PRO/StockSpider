version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: stockspider-backend
    environment:
      - PORT=3002
      - DB_HOST=185.183.35.80
      - DB_PORT=3307
      - DB_USER=root
      - DB_PASSWORD=StrongPass123
      - DB_NAME=spider_stock
      - JWT_SECRET=spt@k_secret_key
    ports:
      - "3002:3002"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_API_URL=http://185.183.35.80:3002
    container_name: stockspider-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend
    restart: unless-stopped


